```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Guilherme + Marcella</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.sugestoes {
  border: 1px solid #ddd;
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 10px;
  background: white;
}
.item-sugestao {
  padding: 8px;
  cursor: pointer;
}
.item-sugestao:hover {
  background: #f2f2f2;
}
</style>

</head>
<body>

<header id="topo">
  <nav>
    <a href="#rsvp">Confirmar Presença</a>
    <a href="presentes.html">Presentes</a>
  </nav>
</header>

<section class="hero">
  <div class="container">
    <h1>GUILHERME + MARCELLA</h1>
    <h2>09.05.2026</h2>
    <h2>16h15</h2>
  </div>
</section>

<section id="rsvp">
  <div class="container" style="text-align:center;">
    <h2>Confirmar Presença</h2>
    <button class="botao-rsvp" onclick="abrirModalRSVP()">CONFIRMAR</button>
  </div>
</section>

<!-- MODAL -->
<div class="modal-bg" id="modalRSVP">
  <div class="modal">

    <div style="display:flex; justify-content:space-between;">
      <h3>Confirmar presença</h3>
      <button onclick="fecharModalRSVP()">✕</button>
    </div>

    <form id="rsvpForm">

      <input type="text" id="buscaConvidado" placeholder="Digite seu nome..." autocomplete="off">
      <div id="listaSugestoes" class="sugestoes"></div>

      <input type="text" id="telefone" placeholder="Telefone" required>

      <div id="acompanhantesContainer"></div>

      <select id="presenca" required>
        <option value="">Vocês irão?</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>

      <button type="submit">Enviar</button>
    </form>

  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRSETHYwuEhR6ZXfrBhh5mJPqzOKzJxp_wAmFVtvruw92bZV3R-7PXDlhj02UOOT_PZA/exec";

let convidados = [];
let convidadoSelecionado = null;

async function carregarConvidados(){
  const res = await fetch(SCRIPT_URL);
  convidados = await res.json();
}
carregarConvidados();

// MODAL
function abrirModalRSVP(){
  document.getElementById("modalRSVP").style.display = "flex";
}
function fecharModalRSVP(){
  document.getElementById("modalRSVP").style.display = "none";
}

// BUSCA
const inputBusca = document.getElementById("buscaConvidado");
const lista = document.getElementById("listaSugestoes");

inputBusca.addEventListener("input", function(){
  const termo = this.value.toLowerCase();
  lista.innerHTML = "";

  if(!termo) return;

  const resultados = convidados.filter(c =>
    c.nome.toLowerCase().includes(termo)
  );

  resultados.forEach(c => {
    const div = document.createElement("div");
    div.className = "item-sugestao";
    div.innerText = c.nome;

    div.onclick = () => selecionarConvidado(c);

    lista.appendChild(div);
  });
});

function selecionarConvidado(c){
  convidadoSelecionado = c;
  inputBusca.value = c.nome;
  lista.innerHTML = "";

  const container = document.getElementById("acompanhantesContainer");
  container.innerHTML = "";

  if(c.acompanhantes.length === 0){
    container.innerHTML = "<p>Sem acompanhantes</p>";
    return;
  }

  container.innerHTML = "<p>Acompanhantes:</p>";

  c.acompanhantes.forEach(nome => {
    const div = document.createElement("div");

    div.innerHTML = `
      <label>
        <input type="checkbox" class="acompanhanteCheck" value="${nome}" checked>
        ${nome}
      </label>
    `;

    container.appendChild(div);
  });
}

// SUBMIT
document.getElementById("rsvpForm").addEventListener("submit", function(e){
  e.preventDefault();

  if(!convidadoSelecionado){
    alert("Selecione seu nome");
    return;
  }

  const acompanhantes = Array.from(
    document.querySelectorAll(".acompanhanteCheck:checked")
  ).map(el => el.value);

  const dados = {
    nome: convidadoSelecionado.nome,
    telefone: document.getElementById("telefone").value,
    acompanhantes: acompanhantes.join(", "),
    presenca: document.getElementById("presenca").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(res => res.text())
  .then(resp => {

    if(resp === "JA_CONFIRMADO"){
      alert("Já confirmado anteriormente.");
      return;
    }

    if(resp === "NAO_ENCONTRADO"){
      alert("Nome não encontrado.");
      return;
    }

    alert("Confirmado com sucesso!");
    fecharModalRSVP();
    this.reset();
    document.getElementById("acompanhantesContainer").innerHTML = "";
  })
  .catch(() => alert("Erro ao enviar"));
});

// ABRIR VIA LINK
document.querySelectorAll('a[href="#rsvp"]').forEach(link => {
  link.addEventListener('click', function(e){
    e.preventDefault();
    abrirModalRSVP();
  });
});
</script>

</body>
</html>
```
